name: Deploy to Client Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Deploy to client Vercel
        run: npx vercel --prod --token=${{ secrets.CLIENT_VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.CLIENT_VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.CLIENT_VERCEL_PROJECT_ID }}
